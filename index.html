<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>직소 퍼즐</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#1a1a2e;--card:#0f3460;--accent:#e94560;--gold:#f5a623;--teal:#00b4d8;--green:#06d6a0;--text:#eaeaea;--muted:#8892b0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 15% 25%,rgba(255,255,255,.12) 0%,transparent 100%),radial-gradient(1px 1px at 70% 15%,rgba(255,255,255,.1) 0%,transparent 100%),radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.08) 0%,transparent 100%);pointer-events:none;z-index:0}
header{position:relative;z-index:10;text-align:center;padding:30px 20px 14px}
header h1{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,5vw,3rem);background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:var(--muted);font-size:.82rem;margin-top:5px;letter-spacing:1px}
.controls{position:relative;z-index:10;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:10px;padding:12px 16px}
.btn{font-family:'Fredoka One',cursive;font-size:.9rem;padding:9px 20px;border:none;border-radius:50px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-2px)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c1121f);color:#fff;box-shadow:0 4px 14px rgba(233,69,96,.4)}
.btn-secondary{background:linear-gradient(135deg,var(--teal),#0077b6);color:#fff;box-shadow:0 4px 14px rgba(0,180,216,.3)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#d4880a);color:#fff;box-shadow:0 4px 14px rgba(245,166,35,.3)}
select{font-family:'Nunito',sans-serif;font-size:.88rem;padding:9px 14px;border-radius:50px;border:2px solid rgba(255,255,255,.1);background:var(--card);color:var(--text);cursor:pointer;outline:none}
.upload-btn{font-family:'Fredoka One',cursive;font-size:.9rem;padding:9px 20px;border-radius:50px;background:var(--card);border:2px dashed rgba(255,255,255,.2);color:var(--muted);cursor:pointer;transition:all .2s}
.upload-btn:hover{border-color:var(--gold);color:var(--gold)}
.saved-wrap{position:relative;z-index:10;display:flex;flex-wrap:wrap;gap:8px;padding:6px 16px;justify-content:center}
.saved-thumb{width:48px;height:48px;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,.1);cursor:pointer;padding:0;background:none;transition:border-color .2s,transform .2s;flex-shrink:0}
.saved-thumb:hover,.saved-thumb.active{border-color:var(--gold);transform:scale(1.1)}
.saved-thumb canvas{display:block;width:100%;height:100%}
.saved-del{width:auto;padding:0 12px;height:48px;border-radius:10px;background:rgba(233,69,96,.12);border:2px dashed rgba(233,69,96,.3);color:var(--accent);font-size:.7rem;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
.saved-del:hover{background:rgba(233,69,96,.25)}
.progress-wrap{position:relative;z-index:10;max-width:500px;margin:8px auto;padding:0 20px}
.progress-bar{height:6px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:10px;transition:width .4s ease;width:0%}
.progress-text{text-align:center;font-size:.72rem;color:var(--muted);margin-top:5px;letter-spacing:1px}
.stats{display:flex;justify-content:center;gap:28px;padding:8px 20px 12px;position:relative;z-index:10}
.stat{text-align:center}
.stat-value{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--gold);line-height:1}
.stat-label{font-size:.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.mobile-tip{display:none;text-align:center;font-size:.72rem;color:var(--muted);padding:0 20px 8px;position:relative;z-index:10}
@media(hover:none){.mobile-tip{display:block}}
.game-wrapper{position:relative;z-index:5;display:flex;flex-wrap:nowrap;gap:12px;justify-content:center;padding:0 12px 30px;max-width:1200px;margin:0 auto;align-items:flex-start}
.board-wrap{flex:1 1 0;min-width:0;max-width:520px}
.board-label{font-family:'Fredoka One',cursive;font-size:.8rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;text-align:center}
#puzzle-board{position:relative;background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;box-shadow:inset 0 2px 20px rgba(0,0,0,.3)}
.tray-wrap{flex:0 0 auto;width:130px}
@media(min-width:700px){.tray-wrap{width:210px}}
#piece-tray{background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.07);border-radius:16px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;box-shadow:inset 0 2px 20px rgba(0,0,0,.3);max-height:calc(100vh - 280px);overflow-y:auto}
.puzzle-cell{position:absolute;border:1px solid rgba(255,255,255,.05);transition:box-shadow .15s;overflow:hidden}
.puzzle-cell.correct{border-color:rgba(6,214,160,.4);box-shadow:0 0 10px rgba(6,214,160,.3)}
.puzzle-cell.highlight{box-shadow:inset 0 0 0 3px rgba(245,166,35,.6)!important}
#hint-overlay{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .3s;z-index:5}
#hint-overlay.show{opacity:.25}
.tray-piece{cursor:grab;border-radius:6px;overflow:hidden;border:2px solid rgba(255,255,255,.1);transition:transform .15s,box-shadow .15s,border-color .15s;position:relative;flex-shrink:0}
.tray-piece:hover{transform:scale(1.06) rotate(-1deg);box-shadow:0 8px 20px rgba(0,0,0,.4);border-color:var(--gold);z-index:10}
.tray-piece.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,166,35,.5);transform:scale(1.08);z-index:10}
.tray-piece.dragging{opacity:.5;cursor:grabbing}
#touch-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.8;border-radius:6px;overflow:hidden;display:none;border:2px solid var(--gold);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.success-screen{display:none;position:fixed;inset:0;z-index:1000;background:rgba(10,10,20,.92);align-items:center;justify-content:center;flex-direction:column;gap:18px;text-align:center;padding:20px}
.success-screen.show{display:flex}
.success-emoji{font-size:4.5rem;animation:bounce .6s ease infinite alternate}
.success-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,6vw,3.2rem);background:linear-gradient(135deg,var(--gold),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.success-stats{color:var(--muted);font-size:.95rem;line-height:1.9}
.success-stats span{color:var(--text);font-weight:700}
.history-section{position:relative;z-index:10;max-width:1200px;margin:0 auto;padding:10px 20px 60px}
.history-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.history-title{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--gold)}
.history-count{font-size:.72rem;color:var(--muted);letter-spacing:1px}
.history-clear{font-size:.72rem;color:var(--muted);background:none;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 12px;cursor:pointer;transition:all .2s;margin-left:auto;font-family:'Nunito',sans-serif}
.history-clear:hover{color:var(--accent);border-color:var(--accent)}
.history-grid{display:flex;flex-wrap:wrap;gap:12px}
.history-card{background:var(--card);border-radius:12px;overflow:hidden;width:150px;border:1px solid rgba(255,255,255,.07);transition:transform .2s,box-shadow .2s}
.history-card:hover{transform:translateY(-4px);box-shadow:0 10px 24px rgba(0,0,0,.4)}
.history-info{padding:8px 10px}
.history-date{font-size:.65rem;color:var(--muted)}
.history-meta{font-size:.75rem;color:var(--text);margin-top:3px;font-weight:600}
.history-badge{display:inline-block;background:rgba(6,214,160,.15);color:var(--green);font-size:.6rem;padding:2px 7px;border-radius:20px;margin-top:5px}
.history-empty{color:var(--muted);font-size:.88rem;font-style:italic}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.pop{animation:popIn .3s cubic-bezier(.34,1.56,.64,1) forwards}
</style>
</head>
<body>

<header>
  <h1>🧩 직소 퍼즐</h1>
  <p class="subtitle">조각을 맞춰 그림을 완성하세요!</p>
</header>

<div class="controls">
  <select id="difficulty">
    <option value="3">쉬움 (3×3)</option>
    <option value="4" selected>보통 (4×4)</option>
    <option value="5">어려움 (5×5)</option>
    <option value="6">최고난도 (6×6)</option>
  </select>
  <button class="btn btn-primary" onclick="startGame()">🎮 새 게임</button>
  <button class="btn btn-secondary" onclick="toggleHint()">💡 힌트</button>
  <button class="btn btn-gold" onclick="shuffleTray()">🔀 섞기</button>
  <label class="upload-btn">📷 사진 올리기
    <input type="file" accept="image/*" style="display:none" onchange="onFileLoad(event)"/>
  </label>
</div>

<div class="saved-wrap" id="saved-wrap"></div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-text" id="progress-text">게임을 시작하세요!</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-value" id="stat-moves">0</div><div class="stat-label">이동</div></div>
  <div class="stat"><div class="stat-value" id="stat-time">0:00</div><div class="stat-label">시간</div></div>
  <div class="stat"><div class="stat-value" id="stat-left">-</div><div class="stat-label">남은</div></div>
</div>

<div class="mobile-tip">💡 조각 탭 → 선택 → 보드 빈칸 탭</div>
<div id="touch-ghost"></div>

<div class="game-wrapper">
  <div class="board-wrap">
    <div class="board-label">퍼즐 보드</div>
    <div id="puzzle-board">
      <canvas id="hint-overlay"></canvas>
    </div>
  </div>
  <div class="tray-wrap">
    <div class="board-label">조각 모음</div>
    <div id="piece-tray"></div>
  </div>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-emoji">🎉</div>
  <div class="success-title">완성!</div>
  <div class="success-stats" id="success-stats"></div>
  <button class="btn btn-primary" onclick="document.getElementById('success-screen').classList.remove('show');startGame()">다시 하기</button>
</div>

<div class="history-section">
  <div class="history-header">
    <div class="history-title">🏆 완성 기록</div>
    <div class="history-count" id="history-count"></div>
    <button class="history-clear" onclick="clearHistory()">기록 삭제</button>
  </div>
  <div class="history-grid" id="history-grid">
    <div class="history-empty">아직 완성한 퍼즐이 없어요!</div>
  </div>
</div>

<script>
// ── IndexedDB ─────────────────────────────────────────
var DB_NAME = 'jigsaw_v3', DB_VER = 1, db = null;

function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains('images'))
        d.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
      if (!d.objectStoreNames.contains('history'))
        d.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = function(e) { db = e.target.result; resolve(); };
    req.onerror = function() { reject(req.error); };
  });
}
function dbAll(store) {
  return new Promise(function(res, rej) {
    var req = db.transaction(store, 'readonly').objectStore(store).getAll();
    req.onsuccess = function() { res(req.result); };
    req.onerror = function() { rej(req.error); };
  });
}
function dbAdd(store, data) {
  return new Promise(function(res, rej) {
    var req = db.transaction(store, 'readwrite').objectStore(store).add(data);
    req.onsuccess = function() { res(req.result); };
    req.onerror = function() { rej(req.error); };
  });
}
function dbDel(store, key) {
  return new Promise(function(res, rej) {
    var req = db.transaction(store, 'readwrite').objectStore(store).delete(key);
    req.onsuccess = function() { res(); };
    req.onerror = function() { rej(req.error); };
  });
}
function dbClear(store) {
  return new Promise(function(res, rej) {
    var req = db.transaction(store, 'readwrite').objectStore(store).clear();
    req.onsuccess = function() { res(); };
    req.onerror = function() { rej(req.error); };
  });
}

// ── State ─────────────────────────────────────────────
var grid = 4, pieceW, pieceH, boardW, boardH, totalPieces;
var correctCount = 0, moves = 0, seconds = 0;
var timerInterval = null, hintVisible = false;
var dragPieceId = null, selectedPieceId = null;
var pieces = [], sourceImage = null, savedImages = [];

// ── Boot ──────────────────────────────────────────────
window.addEventListener('load', function() {
  openDB().then(function() {
    return Promise.all([dbAll('images'), dbAll('history')]);
  }).then(function(results) {
    savedImages = results[0];
    renderSaved();
    renderHistory(results[1].slice().reverse());
    if (savedImages.length > 0) {
      loadDataUrl(savedImages[savedImages.length - 1].dataUrl);
    } else {
      makeDefaultImage(function(img) { sourceImage = img; startGame(); });
    }
  }).catch(function(err) {
    console.error('DB error:', err);
    makeDefaultImage(function(img) { sourceImage = img; startGame(); });
  });
});

// ── Saved images ──────────────────────────────────────
function renderSaved() {
  var wrap = document.getElementById('saved-wrap');
  wrap.innerHTML = '';
  savedImages.forEach(function(rec, i) {
    var btn = document.createElement('button');
    btn.className = 'saved-thumb' + (i === savedImages.length - 1 ? ' active' : '');
    var cv = document.createElement('canvas');
    cv.width = 48; cv.height = 48;
    var im = new Image();
    im.onload = function() { cv.getContext('2d').drawImage(im, 0, 0, 48, 48); };
    im.src = rec.dataUrl;
    btn.appendChild(cv);
    btn.onclick = function() {
      document.querySelectorAll('.saved-thumb').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      loadDataUrl(rec.dataUrl);
    };
    wrap.appendChild(btn);
  });
  if (savedImages.length > 0) {
    var del = document.createElement('button');
    del.className = 'saved-del';
    del.textContent = '사진 삭제';
    del.onclick = function() {
      if (!confirm('저장된 사진을 모두 삭제할까요?')) return;
      dbClear('images').then(function() {
        savedImages = [];
        renderSaved();
        makeDefaultImage(function(img) { sourceImage = img; startGame(); });
      });
    };
    wrap.appendChild(del);
  }
}

function onFileLoad(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var dataUrl = ev.target.result;
    var next = function() {
      dbAdd('images', { dataUrl: dataUrl }).then(function(newId) {
        savedImages.push({ id: newId, dataUrl: dataUrl });
        renderSaved();
        loadDataUrl(dataUrl);
      });
    };
    if (savedImages.length >= 10) {
      dbDel('images', savedImages[0].id).then(function() {
        savedImages.shift();
        next();
      });
    } else {
      next();
    }
  };
  reader.readAsDataURL(file);
}

function loadDataUrl(dataUrl) {
  var img = new Image();
  img.onload = function() { sourceImage = img; startGame(); };
  img.src = dataUrl;
}

function makeDefaultImage(cb) {
  var cv = document.createElement('canvas');
  cv.width = 480; cv.height = 480;
  var ctx = cv.getContext('2d');
  var g = ctx.createLinearGradient(0, 0, 480, 480);
  g.addColorStop(0, '#e94560'); g.addColorStop(.33, '#f5a623');
  g.addColorStop(.66, '#00b4d8'); g.addColorStop(1, '#06d6a0');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 480, 480);
  [[120,120,80,'rgba(255,255,255,.15)'],[360,150,60,'rgba(255,255,255,.1)'],
   [240,300,100,'rgba(0,0,0,.1)'],[80,360,50,'rgba(255,255,255,.12)'],
   [400,360,70,'rgba(255,255,255,.08)']].forEach(function(s) {
    ctx.beginPath(); ctx.arc(s[0],s[1],s[2],0,Math.PI*2); ctx.fillStyle=s[3]; ctx.fill();
  });
  ctx.font = '60px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  [['🌟',120,120],['🎨',360,120],['🌈',240,240],['🦋',120,360],['🌸',360,360]]
    .forEach(function(em) { ctx.fillText(em[0], em[1], em[2]); });
  var im = new Image();
  im.onload = function() { cb(im); };
  im.src = cv.toDataURL();
}

// ── Start Game ────────────────────────────────────────
function startGame() {
  if (!sourceImage) return;
  grid = parseInt(document.getElementById('difficulty').value);
  totalPieces = grid * grid;
  correctCount = 0; moves = 0; pieces = [];
  clearInterval(timerInterval);
  seconds = 0; updateTimer();
  timerInterval = setInterval(function() { seconds++; updateTimer(); }, 1000);
  updateStats();

  var boardEl = document.getElementById('puzzle-board');
  var tW = window.innerWidth >= 700 ? 210 : 130;
  var avail = Math.min(window.innerWidth - tW - 40, 500);
  boardW = Math.max(avail, 150); boardH = boardW;
  pieceW = Math.floor(boardW / grid); pieceH = Math.floor(boardH / grid);
  boardW = pieceW * grid; boardH = pieceH * grid;
  boardEl.style.width = boardW + 'px'; boardEl.style.height = boardH + 'px';

  var hint = document.getElementById('hint-overlay');
  hint.width = boardW; hint.height = boardH;
  hint.style.width = boardW + 'px'; hint.style.height = boardH + 'px';
  hint.getContext('2d').drawImage(sourceImage, 0, 0, boardW, boardH);
  if (hintVisible) { hintVisible = false; hint.classList.remove('show'); }

  boardEl.querySelectorAll('.puzzle-cell').forEach(function(c) { c.remove(); });
  document.getElementById('piece-tray').innerHTML = '';

  var order = shuffleArr(Array.from({length: totalPieces}, function(_, i) { return i; }));
  order.forEach(function(id, idx) {
    var row = Math.floor(id / grid), col = id % grid;
    var pc = document.createElement('canvas');
    pc.width = pieceW; pc.height = pieceH;
    pc.getContext('2d').drawImage(sourceImage,
      col * sourceImage.width / grid, row * sourceImage.height / grid,
      sourceImage.width / grid, sourceImage.height / grid,
      0, 0, pieceW, pieceH);

    var cell = document.createElement('div');
    cell.className = 'puzzle-cell';
    cell.style.cssText = 'left:' + (col*pieceW) + 'px;top:' + (row*pieceH) + 'px;width:' + pieceW + 'px;height:' + pieceH + 'px;';
    cell.dataset.id = id;
    cell.addEventListener('dragover', function(ev) { ev.preventDefault(); });
    cell.addEventListener('drop', (function(cid) { return function(ev) { onDrop(ev, cid); }; })(id));
    cell.addEventListener('click', (function(cid) { return function() { onCellClick(cid); }; })(id));
    boardEl.appendChild(cell);

    var tp = document.createElement('div');
    tp.className = 'tray-piece pop';
    tp.draggable = true;
    tp.dataset.id = id;
    tp.style.animationDelay = (idx * 25) + 'ms';
    var tpc = pc.cloneNode();
    tpc.getContext('2d').drawImage(pc, 0, 0);
    tp.appendChild(tpc);

    tp.addEventListener('dragstart', (function(pid, el) { return function() { dragPieceId = pid; setTimeout(function() { el.classList.add('dragging'); }, 0); }; })(id, tp));
    tp.addEventListener('dragend', (function(el) { return function() { el.classList.remove('dragging'); dragPieceId = null; }; })(tp));
    tp.addEventListener('touchstart', (function(pid) { return function(ev) { onTouchStart(ev, pid); }; })(id), { passive: false });
    tp.addEventListener('touchmove', onTouchMove, { passive: false });
    tp.addEventListener('touchend', onTouchEnd, { passive: false });
    tp.addEventListener('click', (function(pid) { return function() { onPieceClick(pid); }; })(id));

    document.getElementById('piece-tray').appendChild(tp);
    pieces.push({ id: id, row: row, col: col, placed: false, trayEl: tp, cellEl: cell });
  });

  updateProgress();
}

// ── Place piece ───────────────────────────────────────
function placePiece(pid, cellId) {
  if (pid === null || pid === undefined) return;
  if (pid !== cellId) {
    var cell = document.querySelector('.puzzle-cell[data-id="' + cellId + '"]');
    if (cell) { cell.style.boxShadow = '0 0 14px rgba(233,69,96,.8)'; setTimeout(function() { cell.style.boxShadow = ''; }, 500); }
    return;
  }
  var piece = pieces.find(function(p) { return p.id === pid; });
  if (!piece || piece.placed) return;
  moves++; correctCount++; piece.placed = true;

  var pc = document.createElement('canvas');
  pc.width = pieceW; pc.height = pieceH;
  pc.getContext('2d').drawImage(sourceImage,
    piece.col * sourceImage.width / grid, piece.row * sourceImage.height / grid,
    sourceImage.width / grid, sourceImage.height / grid, 0, 0, pieceW, pieceH);
  piece.cellEl.appendChild(pc);
  piece.cellEl.classList.add('correct');
  piece.trayEl.remove();
  updateStats(); updateProgress();

  if (correctCount === totalPieces) {
    clearInterval(timerInterval);
    setTimeout(function() { doSaveHistory(); showSuccess(); }, 500);
  }
}

function onDrop(ev, cellId) { ev.preventDefault(); placePiece(dragPieceId, cellId); }
function onCellClick(cellId) { if (selectedPieceId === null) return; placePiece(selectedPieceId, cellId); clearSel(); }

function onPieceClick(id) {
  if (selectedPieceId === id) { clearSel(); return; }
  clearSel();
  selectedPieceId = id;
  var p = pieces.find(function(x) { return x.id === id; });
  if (p) p.trayEl.classList.add('selected');
  document.querySelectorAll('.puzzle-cell:not(.correct)').forEach(function(c) { c.classList.add('highlight'); });
}
function clearSel() {
  selectedPieceId = null;
  pieces.forEach(function(p) { p.trayEl.classList.remove('selected'); });
  document.querySelectorAll('.puzzle-cell').forEach(function(c) { c.classList.remove('highlight'); });
}

// ── Touch ─────────────────────────────────────────────
function onTouchStart(ev, id) {
  ev.preventDefault();
  dragPieceId = id; onPieceClick(id);
  var p = pieces.find(function(x) { return x.id === id; });
  if (!p) return;
  var ghost = document.getElementById('touch-ghost');
  ghost.innerHTML = '';
  var gc = p.trayEl.querySelector('canvas').cloneNode();
  gc.getContext('2d').drawImage(p.trayEl.querySelector('canvas'), 0, 0);
  ghost.appendChild(gc);
  ghost.style.width = pieceW + 'px'; ghost.style.height = pieceH + 'px'; ghost.style.display = 'block';
  var t = ev.touches[0];
  ghost.style.left = (t.clientX - pieceW/2) + 'px'; ghost.style.top = (t.clientY - pieceH/2) + 'px';
}
function onTouchMove(ev) {
  ev.preventDefault();
  if (dragPieceId === null) return;
  var t = ev.touches[0];
  var ghost = document.getElementById('touch-ghost');
  ghost.style.left = (t.clientX - pieceW/2) + 'px'; ghost.style.top = (t.clientY - pieceH/2) + 'px';
  document.querySelectorAll('.puzzle-cell').forEach(function(c) { c.classList.remove('highlight'); });
  var el = document.elementFromPoint(t.clientX, t.clientY);
  var cell = el && el.closest('.puzzle-cell');
  if (cell && !cell.classList.contains('correct')) cell.classList.add('highlight');
}
function onTouchEnd(ev) {
  ev.preventDefault();
  document.getElementById('touch-ghost').style.display = 'none';
  if (dragPieceId === null) return;
  var t = ev.changedTouches[0];
  var el = document.elementFromPoint(t.clientX, t.clientY);
  var cell = el && el.closest('.puzzle-cell');
  if (cell) placePiece(dragPieceId, parseInt(cell.dataset.id));
  dragPieceId = null; clearSel();
}

// ── Hint / Shuffle ────────────────────────────────────
function toggleHint() { hintVisible = !hintVisible; document.getElementById('hint-overlay').classList.toggle('show', hintVisible); }
function shuffleTray() { var tray = document.getElementById('piece-tray'); shuffleArr(Array.from(tray.children)).forEach(function(c) { tray.appendChild(c); }); }

// ── Stats ─────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-moves').textContent = moves;
  document.getElementById('stat-left').textContent = totalPieces - correctCount;
}
function updateTimer() {
  var m = Math.floor(seconds/60), s = seconds%60;
  document.getElementById('stat-time').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}
function updateProgress() {
  var pct = Math.round((correctCount/totalPieces)*100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent =
    correctCount === 0 ? '게임을 시작하세요!' :
    correctCount === totalPieces ? '완성! 🎉' :
    correctCount + ' / ' + totalPieces + ' 조각 완료 (' + pct + '%)';
}
function showSuccess() {
  var m = Math.floor(seconds/60), s = seconds%60;
  document.getElementById('success-stats').innerHTML =
    '⏱ 완료 시간: <span>' + m + '분 ' + s + '초</span><br>🖱 이동 횟수: <span>' + moves + '번</span><br>🧩 조각 수: <span>' + totalPieces + '개</span>';
  document.getElementById('success-screen').classList.add('show');
}

// ── History ───────────────────────────────────────────
function doSaveHistory() {
  var cv = document.createElement('canvas');
  cv.width = boardW; cv.height = boardH;
  cv.getContext('2d').drawImage(sourceImage, 0, 0, boardW, boardH);
  var now = new Date();
  var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
  var dateStr = now.getFullYear() + '.' + pad(now.getMonth()+1) + '.' + pad(now.getDate()) + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
  dbAdd('history', { dataUrl: cv.toDataURL('image/jpeg', .6), date: dateStr, grid: grid, moves: moves, seconds: seconds })
    .then(function() { return dbAll('history'); })
    .then(function(hist) { renderHistory(hist.slice().reverse()); })
    .catch(function(e) { console.error('History error:', e); });
}

function renderHistory(records) {
  var el = document.getElementById('history-grid');
  document.getElementById('history-count').textContent = records.length ? records.length + '개' : '';
  if (!records.length) { el.innerHTML = '<div class="history-empty">아직 완성한 퍼즐이 없어요!</div>'; return; }
  el.innerHTML = '';
  records.forEach(function(r) {
    var card = document.createElement('div');
    card.className = 'history-card';
    var cv = document.createElement('canvas');
    cv.width = 150; cv.height = 110;
    cv.style.cssText = 'display:block;width:100%;height:110px';
    var im = new Image();
    im.onload = function() { cv.getContext('2d').drawImage(im, 0, 0, 150, 110); };
    im.src = r.dataUrl;
    var m = Math.floor(r.seconds/60), s = r.seconds%60;
    card.appendChild(cv);
    var info = document.createElement('div');
    info.className = 'history-info';
    info.innerHTML = '<div class="history-date">' + r.date + '</div><div class="history-meta">' + r.grid + '×' + r.grid + ' · ' + r.moves + '번 · ' + m + '분' + s + '초</div><div class="history-badge">✅ 완성</div>';
    card.appendChild(info);
    el.appendChild(card);
  });
}

function clearHistory() {
  if (!confirm('완성 기록을 모두 삭제할까요?')) return;
  dbClear('history').then(function() { renderHistory([]); });
}

function shuffleArr(arr) {
  for (var i = arr.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}
</script>
