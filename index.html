<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>직소 퍼즐</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --gold: #f5a623;
    --teal: #00b4d8;
    --green: #06d6a0;
    --text: #eaeaea;
    --muted: #8892b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.12) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 80%, rgba(255,255,255,0.08) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 40%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(2px 2px at 90% 30%, rgba(255,255,255,0.06) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 36px 20px 20px;
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 5vw, 3.2rem);
    background: linear-gradient(135deg, var(--gold), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* ─── CONTROLS ─── */
  .controls {
    position: relative;
    z-index: 10;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
  }

  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
    padding: 10px 22px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #c1121f);
    color: #fff;
    box-shadow: 0 4px 14px rgba(233,69,96,0.4);
  }

  .btn-secondary {
    background: linear-gradient(135deg, var(--teal), #0077b6);
    color: #fff;
    box-shadow: 0 4px 14px rgba(0,180,216,0.3);
  }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #d4880a);
    color: #fff;
    box-shadow: 0 4px 14px rgba(245,166,35,0.3);
  }

  select {
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    padding: 10px 16px;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.1);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }

  .upload-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    padding: 10px 22px;
    border-radius: 50px;
    background: var(--card);
    border: 2px dashed rgba(255,255,255,0.2);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .upload-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ─── STATS BAR ─── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 10px 20px 20px;
    position: relative;
    z-index: 10;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ─── GAME AREA ─── */
  .game-wrapper {
    position: relative;
    z-index: 5;
    display: flex;
    flex-wrap: nowrap;
    gap: 12px;
    justify-content: center;
    padding: 0 12px 40px;
    max-width: 1200px;
    margin: 0 auto;
    align-items: flex-start;
  }

  /* Puzzle board */
  .board-wrap {
    flex: 1 1 0;
    min-width: 0;
    max-width: 520px;
  }

  .board-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }

  #puzzle-board {
    position: relative;
    background: rgba(255,255,255,0.03);
    border: 2px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: inset 0 2px 20px rgba(0,0,0,0.3);
  }

  /* Piece tray */
  .tray-wrap {
    flex: 0 0 auto;
    width: 140px;
  }

  @media (min-width: 700px) {
    .tray-wrap { width: 220px; }
  }

  #piece-tray {
    background: rgba(255,255,255,0.03);
    border: 2px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
    box-shadow: inset 0 2px 20px rgba(0,0,0,0.3);
    /* 화면 높이에 맞게 스크롤 */
    max-height: calc(100vh - 260px);
    overflow-y: auto;
  }

  /* ─── PUZZLE PIECES ─── */
  .puzzle-cell {
    position: absolute;
    border: 1px solid rgba(255,255,255,0.05);
    transition: box-shadow 0.15s ease;
    overflow: hidden;
  }

  .puzzle-cell.correct {
    border-color: rgba(6,214,160,0.4);
    box-shadow: 0 0 10px rgba(6,214,160,0.3);
  }

  .tray-piece {
    cursor: grab;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.1);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    position: relative;
    flex-shrink: 0;
  }

  .tray-piece:hover {
    transform: scale(1.06) rotate(-1deg);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    border-color: var(--gold);
    z-index: 10;
  }

  .tray-piece.dragging {
    opacity: 0.5;
    cursor: grabbing;
  }

  /* Mobile selected */
  .tray-piece.selected {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(245,166,35,0.5), 0 8px 20px rgba(0,0,0,0.4);
    transform: scale(1.08);
    z-index: 10;
  }

  /* Touch ghost */
  #touch-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.8;
    border-radius: 6px;
    overflow: hidden;
    display: none;
    border: 2px solid var(--gold);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .puzzle-cell.highlight {
    box-shadow: inset 0 0 0 3px rgba(245,166,35,0.6) !important;
  }

  .mobile-tip {
    display: none;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    padding: 0 20px 8px;
    position: relative;
    z-index: 10;
  }
  @media (hover: none) { .mobile-tip { display: block; } }

  .tray-piece canvas,
  .puzzle-cell canvas {
    display: block;
  }

  /* ─── HINT OVERLAY ─── */
  #hint-overlay {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 5;
  }
  #hint-overlay.show { opacity: 0.25; }

  /* ─── SUCCESS SCREEN ─── */
  .success-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(10,10,20,0.92);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    text-align: center;
    padding: 20px;
  }
  .success-screen.show { display: flex; }

  .success-emoji {
    font-size: 5rem;
    animation: bounce 0.6s ease infinite alternate;
  }

  .success-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    background: linear-gradient(135deg, var(--gold), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .success-stats {
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.8;
  }

  .success-stats span {
    color: var(--text);
    font-weight: 700;
  }

  /* ─── PROGRESS BAR ─── */
  .progress-wrap {
    position: relative;
    z-index: 10;
    max-width: 500px;
    margin: 0 auto 16px;
    padding: 0 20px;
  }

  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--green));
    border-radius: 10px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-12px); }
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ─── HISTORY ─── */
  .history-section {
    position: relative;
    z-index: 10;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  .history-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .history-title span {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-weight: 400;
    letter-spacing: 1px;
  }

  .history-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .history-card {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    width: 160px;
    border: 1px solid rgba(255,255,255,0.07);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .history-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 24px rgba(0,0,0,0.4);
  }

  .history-card canvas {
    display: block;
    width: 100%;
    height: 120px;
    object-fit: cover;
  }

  .history-info {
    padding: 10px 12px;
  }

  .history-date {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .history-meta {
    font-size: 0.8rem;
    color: var(--text);
    margin-top: 4px;
    font-weight: 600;
  }

  .history-badge {
    display: inline-block;
    background: rgba(6,214,160,0.15);
    color: var(--green);
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  .history-empty {
    color: var(--muted);
    font-size: 0.9rem;
    font-style: italic;
    padding: 10px 0;
  }

  .history-clear {
    font-family: 'Nunito', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }
  .history-clear:hover { color: var(--accent); border-color: var(--accent); }

  /* saved image selector */
  .saved-images {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 20px;
    justify-content: center;
    position: relative;
    z-index: 10;
  }

  .saved-img-btn {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    padding: 0;
    background: none;
  }

  .saved-img-btn:hover, .saved-img-btn.active {
    border-color: var(--gold);
    transform: scale(1.1);
  }

  .saved-img-btn canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</head>
<body>

<!-- HEADER -->
<header>
  <h1>🧩 직소 퍼즐</h1>
  <p class="subtitle">조각을 맞춰 그림을 완성하세요!</p>
</header>

<!-- CONTROLS -->
<div class="controls">
  <select id="difficulty">
    <option value="3">쉬움 (3×3)</option>
    <option value="4" selected>보통 (4×4)</option>
    <option value="5">어려움 (5×5)</option>
    <option value="6">최고난도 (6×6)</option>
  </select>
  <button class="btn btn-primary" onclick="startGame()">🎮 새 게임</button>
  <button class="btn btn-secondary" onclick="toggleHint()">💡 힌트</button>
  <button class="btn btn-gold" onclick="shuffleTray()">🔀 섞기</button>
  <label class="upload-btn">📷 사진 올리기 <input type="file" accept="image/*" style="display:none" onchange="loadImage(event)"/></label>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-text" id="progress-text">게임을 시작하세요!</div>
</div>

<!-- MOBILE TIP -->
<div class="mobile-tip">💡 조각을 탭해서 선택 → 보드의 빈칸을 탭해서 놓기</div>

<!-- TOUCH GHOST -->
<div id="touch-ghost"></div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-value" id="stat-moves">0</div><div class="stat-label">이동 횟수</div></div>
  <div class="stat"><div class="stat-value" id="stat-time">0:00</div><div class="stat-label">시간</div></div>
  <div class="stat"><div class="stat-value" id="stat-left">-</div><div class="stat-label">남은 조각</div></div>
</div>

<!-- SAVED IMAGES -->
<div class="saved-images" id="saved-images"></div>

<!-- GAME -->
<div class="game-wrapper">
  <div class="board-wrap">
    <div class="board-label">퍼즐 보드</div>
    <div id="puzzle-board">
      <canvas id="hint-overlay"></canvas>
    </div>
  </div>
  <div class="tray-wrap">
    <div class="board-label">조각 모음</div>
    <div id="piece-tray"></div>
  </div>
</div>

<!-- SUCCESS -->
<div class="success-screen" id="success-screen">
  <div class="success-emoji">🎉</div>
  <div class="success-title">완성!</div>
  <div class="success-stats" id="success-stats"></div>
  <button class="btn btn-primary" onclick="startGame(); document.getElementById('success-screen').classList.remove('show')">다시 하기</button>
</div>

<!-- HISTORY -->
<div class="history-section">
  <div class="history-title">
    🏆 완성 기록
    <span id="history-count"></span>
    <button class="history-clear" onclick="clearHistory()">기록 삭제</button>
  </div>
  <div class="history-grid" id="history-grid">
    <div class="history-empty">아직 완성한 퍼즐이 없어요!</div>
  </div>
</div>

<script>
// ── IndexedDB ──────────────────────────────────────
const DB_NAME = 'jigsaw_db', DB_VER = 1;
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('images'))
        d.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
      if (!d.objectStoreNames.contains('history'))
        d.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = () => reject(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

function dbAdd(store, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).add(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

function dbClear(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).clear();
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

// ── State ──────────────────────────────────────────
let grid = 4;
let pieceW, pieceH, boardW, boardH;
let totalPieces;
let correctCount = 0;
let moves = 0;
let seconds = 0;
let timerInterval = null;
let hintVisible = false;
let dragPieceId = null;
let selectedPieceId = null;
let pieces = [];
let sourceImage = null;
let savedImages = []; // { id, dataUrl }

// ── Init ────────────────────────────────────────────
window.onload = async () => {
  await openDB();
  await loadSavedImages();
  await loadHistory();
  if (savedImages.length > 0) {
    await selectSavedImage(savedImages[0]);
  } else {
    sourceImage = await createDefaultImage();
    startGame();
  }
};

// ── Saved images ──────────────────────────────────
async function loadSavedImages() {
  savedImages = await dbGetAll('images');
  renderSavedImages();
}

function renderSavedImages() {
  const wrap = document.getElementById('saved-images');
  wrap.innerHTML = '';
  savedImages.forEach(img => {
    const btn = document.createElement('button');
    btn.className = 'saved-img-btn';
    btn.title = '이 사진으로 퍼즐 시작';

    const c = document.createElement('canvas');
    c.width = 52; c.height = 52;
    const image = new Image();
    image.onload = () => {
      c.getContext('2d').drawImage(image, 0, 0, 52, 52);
    };
    image.src = img.dataUrl;
    btn.appendChild(c);
    btn.onclick = () => selectSavedImage(img);
    wrap.appendChild(btn);
  });
}

async function selectSavedImage(imgRecord) {
  document.querySelectorAll('.saved-img-btn').forEach(b => b.classList.remove('active'));
  const img = new Image();
  img.onload = () => { sourceImage = img; startGame(); };
  img.src = imgRecord.dataUrl;
}

// ── Load custom image ──────────────────────────────
function loadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const dataUrl = ev.target.result;

    // 중복 방지: 이미 10장이면 가장 오래된 것 삭제
    if (savedImages.length >= 10) {
      const tx = db.transaction('images', 'readwrite');
      tx.objectStore('images').delete(savedImages[0].id);
      savedImages.shift();
    }

    const id = await dbAdd('images', { dataUrl });
    savedImages.push({ id, dataUrl });
    renderSavedImages();

    const img = new Image();
    img.onload = () => { sourceImage = img; startGame(); };
    img.src = dataUrl;
  };
  reader.readAsDataURL(file);
}

// ── Default image ──────────────────────────────────
function createDefaultImage() {
  return new Promise(resolve => {
    const c = document.createElement('canvas');
    c.width = 480; c.height = 480;
    const ctx = c.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 480, 480);
    grad.addColorStop(0, '#e94560');
    grad.addColorStop(0.33, '#f5a623');
    grad.addColorStop(0.66, '#00b4d8');
    grad.addColorStop(1, '#06d6a0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 480, 480);
    const shapes = [
      { x: 120, y: 120, r: 80, color: 'rgba(255,255,255,0.15)' },
      { x: 360, y: 150, r: 60, color: 'rgba(255,255,255,0.1)'  },
      { x: 240, y: 300, r: 100,color: 'rgba(0,0,0,0.1)'        },
      { x: 80,  y: 360, r: 50, color: 'rgba(255,255,255,0.12)' },
      { x: 400, y: 360, r: 70, color: 'rgba(255,255,255,0.08)' },
    ];
    shapes.forEach(s => {
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = s.color; ctx.fill();
    });
    ctx.font = 'bold 60px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    [['🌟',120,120],['🎨',360,120],['🌈',240,240],['🦋',120,360],['🌸',360,360]]
      .forEach(([e,x,y]) => ctx.fillText(e, x, y));
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = c.toDataURL();
  });
}

// ── Start Game ─────────────────────────────────────
function startGame() {
  grid = parseInt(document.getElementById('difficulty').value);
  totalPieces = grid * grid;
  correctCount = 0; moves = 0; pieces = [];

  clearInterval(timerInterval);
  seconds = 0; updateTimer();
  timerInterval = setInterval(() => { seconds++; updateTimer(); }, 1000);
  updateStats();

  const boardEl = document.getElementById('puzzle-board');
  const trayW = window.innerWidth >= 700 ? 220 : 140;
  const gapPad = 36;
  const available = Math.min(window.innerWidth - trayW - gapPad, 500);
  const maxW = Math.max(available, 160);
  boardW = maxW; boardH = maxW;
  pieceW = Math.floor(boardW / grid); pieceH = Math.floor(boardH / grid);
  boardW = pieceW * grid; boardH = pieceH * grid;
  boardEl.style.width = boardW + 'px'; boardEl.style.height = boardH + 'px';

  const hint = document.getElementById('hint-overlay');
  hint.width = boardW; hint.height = boardH;
  hint.style.width = boardW + 'px'; hint.style.height = boardH + 'px';
  hint.getContext('2d').drawImage(sourceImage, 0, 0, boardW, boardH);
  if (hintVisible) { hintVisible = false; hint.classList.remove('show'); }

  boardEl.querySelectorAll('.puzzle-cell').forEach(c => c.remove());
  const order = shuffleArray([...Array(totalPieces).keys()]);

  order.forEach((id, trayIdx) => {
    const row = Math.floor(id / grid), col = id % grid;
    const pc = document.createElement('canvas');
    pc.width = pieceW; pc.height = pieceH;
    pc.getContext('2d').drawImage(sourceImage,
      col*(sourceImage.width/grid), row*(sourceImage.height/grid),
      sourceImage.width/grid, sourceImage.height/grid, 0, 0, pieceW, pieceH);

    const cell = document.createElement('div');
    cell.className = 'puzzle-cell';
    cell.style.cssText = `left:${col*pieceW}px;top:${row*pieceH}px;width:${pieceW}px;height:${pieceH}px;`;
    cell.dataset.id = id;
    cell.addEventListener('dragover', e => e.preventDefault());
    cell.addEventListener('drop', e => dropOnCell(e, id));
    cell.addEventListener('click', () => tapOnCell(id));
    boardEl.appendChild(cell);

    const tp = document.createElement('div');
    tp.className = 'tray-piece pop';
    tp.draggable = true;
    tp.dataset.id = id;
    tp.style.animationDelay = (trayIdx * 30) + 'ms';
    const tpc = pc.cloneNode();
    tpc.getContext('2d').drawImage(pc, 0, 0);
    tp.appendChild(tpc);

    tp.addEventListener('dragstart', e => { dragPieceId = id; setTimeout(() => tp.classList.add('dragging'), 0); });
    tp.addEventListener('dragend', () => { tp.classList.remove('dragging'); dragPieceId = null; });
    tp.addEventListener('touchstart', e => handleTouchStart(e, id), { passive: false });
    tp.addEventListener('touchmove',  e => handleTouchMove(e),      { passive: false });
    tp.addEventListener('touchend',   e => handleTouchEnd(e),       { passive: false });
    tp.addEventListener('click', () => selectPiece(id));

    document.getElementById('piece-tray').appendChild(tp);
    pieces.push({ id, row, col, placed: false, trayEl: tp, cellEl: cell });
  });

  const tray = document.getElementById('piece-tray');
  tray.innerHTML = '';
  pieces.forEach(p => tray.appendChild(p.trayEl));
  updateProgress();
}

// ── Tap select ────────────────────────────────────
function selectPiece(id) {
  if (selectedPieceId === id) { clearSelection(); return; }
  clearSelection();
  selectedPieceId = id;
  const piece = pieces.find(p => p.id === id);
  if (piece) piece.trayEl.classList.add('selected');
  document.querySelectorAll('.puzzle-cell:not(.correct)').forEach(c => c.classList.add('highlight'));
}

function clearSelection() {
  selectedPieceId = null;
  pieces.forEach(p => p.trayEl.classList.remove('selected'));
  document.querySelectorAll('.puzzle-cell').forEach(c => c.classList.remove('highlight'));
}

function tapOnCell(cellId) {
  if (selectedPieceId === null) return;
  dropOnCell({ preventDefault: () => {} }, cellId, selectedPieceId);
  clearSelection();
}

// ── Touch drag ────────────────────────────────────
function handleTouchStart(e, id) {
  e.preventDefault();
  dragPieceId = id; selectPiece(id);
  const piece = pieces.find(p => p.id === id);
  if (!piece) return;
  const ghost = document.getElementById('touch-ghost');
  ghost.innerHTML = '';
  const gc = piece.trayEl.querySelector('canvas').cloneNode();
  gc.getContext('2d').drawImage(piece.trayEl.querySelector('canvas'), 0, 0);
  ghost.appendChild(gc);
  ghost.style.width = pieceW + 'px'; ghost.style.height = pieceH + 'px'; ghost.style.display = 'block';
  const t = e.touches[0];
  ghost.style.left = (t.clientX - pieceW/2) + 'px'; ghost.style.top = (t.clientY - pieceH/2) + 'px';
}

function handleTouchMove(e) {
  e.preventDefault();
  if (dragPieceId === null) return;
  const t = e.touches[0];
  const ghost = document.getElementById('touch-ghost');
  ghost.style.left = (t.clientX - pieceW/2) + 'px'; ghost.style.top = (t.clientY - pieceH/2) + 'px';
  document.querySelectorAll('.puzzle-cell').forEach(c => c.classList.remove('highlight'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const cell = el && el.closest('.puzzle-cell');
  if (cell && !cell.classList.contains('correct')) cell.classList.add('highlight');
}

function handleTouchEnd(e) {
  e.preventDefault();
  document.getElementById('touch-ghost').style.display = 'none';
  if (dragPieceId === null) return;
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const cell = el && el.closest('.puzzle-cell');
  if (cell) dropOnCell({ preventDefault: () => {} }, parseInt(cell.dataset.id), dragPieceId);
  dragPieceId = null; clearSelection();
}

// ── Drop ──────────────────────────────────────────
function dropOnCell(e, cellId, forcePieceId) {
  e.preventDefault();
  const pid = forcePieceId !== undefined ? forcePieceId : dragPieceId;
  if (pid === null || pid === undefined) return;
  if (pid !== cellId) {
    const cell = document.querySelector(`.puzzle-cell[data-id="${cellId}"]`);
    if (cell) { cell.style.boxShadow = '0 0 12px rgba(233,69,96,0.7)'; setTimeout(() => cell.style.boxShadow = '', 500); }
    return;
  }
  const piece = pieces.find(p => p.id === pid);
  if (!piece || piece.placed) return;
  moves++; correctCount++; piece.placed = true;

  const pc = document.createElement('canvas');
  pc.width = pieceW; pc.height = pieceH;
  pc.getContext('2d').drawImage(sourceImage,
    piece.col*(sourceImage.width/grid), piece.row*(sourceImage.height/grid),
    sourceImage.width/grid, sourceImage.height/grid, 0, 0, pieceW, pieceH);
  piece.cellEl.appendChild(pc);
  piece.cellEl.classList.add('correct');
  piece.trayEl.remove();
  updateStats(); updateProgress();

  if (correctCount === totalPieces) {
    clearInterval(timerInterval);
    setTimeout(() => { saveHistory(); showSuccess(); }, 600);
  }
}

// ── History ───────────────────────────────────────
async function saveHistory() {
  // 완성된 보드를 캡처
  const canvas = document.createElement('canvas');
  canvas.width = boardW; canvas.height = boardH;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(sourceImage, 0, 0, boardW, boardH);

  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const record = {
    dataUrl: canvas.toDataURL('image/jpeg', 0.6),
    date: dateStr,
    grid,
    moves,
    seconds
  };
  await dbAdd('history', record);
  await loadHistory();
}

async function loadHistory() {
  const records = await dbGetAll('history');
  renderHistory(records.reverse()); // 최신순
}

function renderHistory(records) {
  const grid_el = document.getElementById('history-grid');
  const count_el = document.getElementById('history-count');
  count_el.textContent = records.length > 0 ? `${records.length}개` : '';

  if (records.length === 0) {
    grid_el.innerHTML = '<div class="history-empty">아직 완성한 퍼즐이 없어요!</div>';
    return;
  }

  grid_el.innerHTML = '';
  records.forEach(r => {
    const card = document.createElement('div');
    card.className = 'history-card';

    const canvas = document.createElement('canvas');
    canvas.width = 160; canvas.height = 120;
    const img = new Image();
    img.onload = () => canvas.getContext('2d').drawImage(img, 0, 0, 160, 120);
    img.src = r.dataUrl;

    const m = Math.floor(r.seconds/60), s = r.seconds%60;
    card.innerHTML = `
      <div class="history-info">
        <div class="history-date">${r.date}</div>
        <div class="history-meta">${r.grid}×${r.grid} · ${r.moves}번 · ${m}분${s}초</div>
        <div class="history-badge">✅ 완성</div>
      </div>`;
    card.insertBefore(canvas, card.firstChild);
    grid_el.appendChild(card);
  });
}

async function clearHistory() {
  if (!confirm('완성 기록을 모두 삭제할까요?')) return;
  await dbClear('history');
  await loadHistory();
}

// ── Hint ──────────────────────────────────────────
function toggleHint() {
  hintVisible = !hintVisible;
  document.getElementById('hint-overlay').classList.toggle('show', hintVisible);
}

// ── Shuffle ───────────────────────────────────────
function shuffleTray() {
  const tray = document.getElementById('piece-tray');
  shuffleArray(Array.from(tray.children)).forEach(c => tray.appendChild(c));
}

// ── Stats ─────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-moves').textContent = moves;
  document.getElementById('stat-left').textContent  = totalPieces - correctCount;
}
function updateTimer() {
  const m = Math.floor(seconds/60), s = seconds%60;
  document.getElementById('stat-time').textContent = m + ':' + String(s).padStart(2,'0');
}
function updateProgress() {
  const pct = Math.round((correctCount/totalPieces)*100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent =
    correctCount === 0 ? '게임을 시작하세요!' :
    correctCount === totalPieces ? '완성! 🎉' :
    `${correctCount} / ${totalPieces} 조각 완료 (${pct}%)`;
}

function showSuccess() {
  const m = Math.floor(seconds/60), s = seconds%60;
  document.getElementById('success-stats').innerHTML =
    `⏱ 완료 시간: <span>${m}분 ${s}초</span><br>🖱 이동 횟수: <span>${moves}번</span><br>🧩 조각 수: <span>${totalPieces}개</span>`;
  document.getElementById('success-screen').classList.add('show');
}

function shuffleArray(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
